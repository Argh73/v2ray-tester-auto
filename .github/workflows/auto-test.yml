name: Auto V2Ray Tester

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install -r requirements.txt requests

      - name: Download Xray
        run: |
          mkdir -p xray-linux-64
          cd xray-linux-64
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o Xray-linux-64.zip
          chmod +x xray
          cd ..

      - name: Run Tester
        run: timeout 15m python headless_runner.py || echo "Finished/Timeout"

      - name: Commit Results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add Test.txt working.txt bad_subs.txt configs.txt 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto Update: 1742+ working configs $(date -u)"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Argh73/v2ray-tester-auto.git HEAD:main
            echo "✅ Successfully pushed Test.txt"
          fi
