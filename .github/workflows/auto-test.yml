name: Auto V2Ray Tester

on:
  schedule:
    - cron: '0 */6 * * *'    # هر ۶ ساعت
  workflow_dispatch:         # امکان اجرای دستی

jobs:
  test-configs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download Xray Core
        run: |
          mkdir -p xray-linux-64
          cd xray-linux-64
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o Xray-linux-64.zip
          chmod +x xray
          cd ..

      - name: Prepare subs.txt
        run: |
          echo "https://raw.githubusercontent.com/Argh73/VpnConfigCollector/refs/heads/main/All_Configs_Sub.txt" > subs.txt
          echo "✅ Raw link added to subs.txt"

      - name: Run Headless Tester (with limit)
        run: |
          timeout 28m python headless_runner.py || echo "Process finished or timed out"

      - name: Commit Results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add Test.txt working.txt bad_subs.txt 2>/dev/null || true
          git commit -m "Auto Update: Tested configs $(date -u)" || echo "No changes to commit"
          git push
