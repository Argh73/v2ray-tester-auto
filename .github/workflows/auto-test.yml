name: Auto V2Ray Tester

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install -r requirements.txt

      - name: Download Xray
        run: |
          mkdir -p xray-linux-64
          cd xray-linux-64
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          unzip -o Xray-linux-64.zip
          chmod +x xray

      - name: Debug Runner
        run: timeout 20m python headless_runner.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Test.txt working.txt bad_subs.txt 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "Auto Update $(date -u)"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/Argh73/v2ray-tester-auto.git HEAD:main
          else
            echo "No changes"
          fi
